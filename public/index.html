<style>
  :root{
    --bg:#0b0f13;
    --panel:#0f141a;
    --glass:rgba(15,21,27,.72);
    --glass-brd:rgba(55,137,153,.35);
    --chip:#0d2e35;
    --chip-brd:#12434d;
    --pill:#00c7d8;
    --pill-text:#002326;
    --text:#e9f7ff;
    --muted:#a7bdc5;
    --line:rgba(86,150,160,.35);
  }

  /* page + theme */
  html,body{height:100%}
  body{
    margin:0; color:var(--text); background:var(--bg);
    font:15px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial,Helvetica,sans-serif;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(800px 520px at 20% 12%, rgba(0,209,234,.08) 0,transparent 62%),
      radial-gradient(800px 520px at 88% 8%, rgba(0,209,234,.07) 0,transparent 60%);
  }
  .wrap{max-width:1160px; margin:28px auto; padding:0 16px}

  /* header */
  .bar{display:flex; align-items:center; gap:10px; margin-bottom:18px}
  .crumbs{font-weight:700; letter-spacing:.3px}
  .crumbs .tag{display:inline-block; padding:3px 8px; border-radius:999px; margin-left:6px;
    background:#06323a; color:#76f7ff; font-size:12px; border:1px solid var(--glass-brd)}
  .grow{flex:1}
  .btn{appearance:none; border:1px solid var(--glass-brd); background:var(--glass); color:var(--text);
    padding:10px 14px; border-radius:12px; font-weight:650; cursor:pointer}
  .btn:hover{border-color:#3adcf0}
  .btn-primary{background:#ff2b2b; border-color:#ff2b2b}
  .btn-ghost{background:transparent}

  /* filter chips */
  #chips{display:flex; gap:10px; flex-wrap:wrap; margin:16px 0 10px}
  .chip{border:1px solid var(--glass-brd); background:var(--panel); color:#cdeef2;
    padding:8px 12px; border-radius:999px; cursor:pointer; user-select:none}
  .chip.active{background:#0b2c34; border-color:#1db8c4}

  /* ── Embossed grid cards ── */
  #grid{display:grid; gap:14px; grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .card{
    position:relative;
    display:flex; flex-direction:column;
    background:linear-gradient(175deg,#112433 0%,#081521 100%);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:16px; overflow:hidden;
    padding-bottom:56px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.07),
      0 2px 4px rgba(0,0,0,0.4),
      0 10px 28px rgba(0,0,0,0.5);
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .card:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,0.13);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      0 4px 8px rgba(0,0,0,0.45),
      0 18px 36px rgba(0,0,0,0.55);
  }

  /* image box */
  .imgbox{position:relative; height:200px; background:#0b0e12; cursor:pointer}
  .imgbox img{width:100%; height:100%; object-fit:cover; display:block}

  /* ── Status corner pills (On Demo / What's New / Discontinued) ── */
  .status-pill{
    position:absolute; top:10px; left:10px; z-index:2;
    padding:5px 11px; border-radius:9999px;
    font:700 11px/1 system-ui,sans-serif;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 2px 6px rgba(0,0,0,0.4);
    pointer-events:none;
  }
  /* On Demo → amber/gold */
  .status-pill--on-demo     { background:#ffd400; color:#231a00; }
  /* What's New → emerald green */
  .status-pill--whats-new   { background:#22c55e; color:#052e16; }
  /* Discontinued → rose red, white text */
  .status-pill--discontinued { background:#f43f5e; color:#fff; }

  /* card content */
  .content{display:flex; flex-direction:column; gap:8px; padding:12px 12px 14px; min-height:176px}
  .title{font-weight:800; margin-top:4px}
  .pill{display:inline-flex; align-items:center; gap:8px;
    background:var(--pill); color:var(--pill-text); border-radius:9999px; padding:8px 12px; font-weight:800; line-height:1}
  .pill.price{max-width:fit-content; width:auto; font-size:15px}
  .aed-icon{
    width:16px; height:16px; display:inline-block; flex:0 0 16px; vertical-align:-2px; margin-right:6px;
    -webkit-mask: url("/aed.svg") no-repeat center / contain;
    mask: url("/aed.svg") no-repeat center / contain;
    background:#000;
  }
  .muted{color:var(--muted)}
  .tagrow{display:flex; gap:6px; flex-wrap:wrap}
  .tagrow .chip{background:#082b33;border-color:#11424a}

  /* ── "Add to compare" → styled toggle button ── */
  .foot{
    position:absolute; right:12px; bottom:10px;
    display:flex; justify-content:flex-end; align-items:center;
  }
  .foot label.compare-toggle{
    display:inline-flex; align-items:center; gap:7px;
    padding:6px 12px; border-radius:10px;
    background:#0e2230; color:var(--muted);
    border:1px solid rgba(255,255,255,0.09);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 1px 3px rgba(0,0,0,0.4);
    cursor:pointer; user-select:none;
    font-size:13px; font-weight:600;
    transition: background .15s, color .15s, border-color .15s, box-shadow .15s;
  }
  /* hide the native checkbox */
  .foot label.compare-toggle input[type=checkbox]{ display:none }
  /* the visual tick box */
  .foot label.compare-toggle .tick{
    width:16px; height:16px; border-radius:4px; flex:0 0 16px;
    background:#1a2e3d; border:1px solid rgba(255,255,255,0.15);
    display:inline-flex; align-items:center; justify-content:center;
    font-size:11px; line-height:1; color:transparent;
    transition: background .15s, border-color .15s, color .15s;
  }
  /* checked state */
  .foot label.compare-toggle.is-selected{
    background:#06b6d4; color:#061018;
    border-color:#22d3ee;
    box-shadow: 0 0 0 2px rgba(34,211,238,0.28), inset 0 1px 0 rgba(255,255,255,0.22);
  }
  .foot label.compare-toggle.is-selected .tick{
    background:#061018; border-color:#061018; color:#22d3ee;
  }

  /* detail modal */
  dialog{border:1px solid var(--glass-brd); border-radius:18px; padding:0; background:rgba(10,14,18,.92);
    color:var(--text); width:min(1000px,96vw)}
  dialog::backdrop{background:rgba(0,0,0,.6)}
  .sheet{display:grid; grid-template-columns:1.1fr 1fr; gap:16px; padding:14px}
  .left{background:var(--panel); border:1px solid var(--glass-brd); border-radius:16px; padding:12px}
  .left .imgwrap{background:#fff; border-radius:12px; overflow:hidden; height:min(58vh,520px)}
  .left .imgwrap img{width:100%; height:100%; object-fit:contain; display:block}
  .right .chiprow{display:flex; gap:8px; align-items:center; margin-bottom:6px}
  .chip.upc{background:#052d33; border:1px solid #0f4950}
  .section{border:1px solid var(--glass-brd); border-radius:12px; padding:12px; margin-top:12px;
    background:rgba(7,12,16,.66)}
  .section h4{margin:0 0 8px; font-size:16px; font-weight:800; color:#fff}
  .section ul{list-style:disc; padding-left:18px; margin:0}
  .section li::marker{color:#26e3ff}
  .xbtn{position:absolute; top:8px; right:8px; background:transparent; border:1px solid var(--glass-brd); color:#fff; border-radius:10px; padding:6px 10px; cursor:pointer}

  /* title row with demo next to it */
  .nameRow{display:flex; align-items:center; gap:8px; margin:2px 0 8px}
  .pill-demo{font-size:12px; padding:4px 8px; border-radius:16px; background:#ffd400; color:#231a00; font-weight:800}

  /* compare */
  #cmp{width:min(1100px,96vw)}
  #cmp .cols{display:grid; grid-auto-flow:column; grid-auto-columns:minmax(300px,1fr); gap:14px; padding:12px; overflow-x:auto; -webkit-overflow-scrolling:touch}
  #cmp .col{background:var(--glass); border:1px solid var(--glass-brd); border-radius:14px; overflow:hidden}
  #cmp .col .pad{padding:12px}
  #cmp .specs{width:100%; border-collapse:collapse}
  #cmp .specs td{border-bottom:1px dotted var(--line); padding:8px 6px}
  #cmp .specs td:first-child{color:#bfefff}
  #ladder{border-top:1px solid var(--glass-brd); margin:4px 12px 14px; padding-top:10px}
  #ladder .row{display:flex; flex-wrap:wrap; gap:8px; align-items:center}

  /* FAB */
  #compareFab{
    position:fixed; right:16px; bottom:16px; z-index:60; display:none; align-items:center; gap:8px;
    padding:10px 14px; border-radius:999px; background:#ff2b2b; color:#fff; border:1px solid #ff2b2b; cursor:pointer
  }
  #compareFab .bubble{background:#fff;color:#ff2b2b; border-radius:999px; padding:2px 8px; font-weight:800}

  /* mobile */
  @media (max-width:720px){
    .sheet{grid-template-columns:1fr}
    .left .imgwrap{height:44vh}
  }
</style>

<body>
  <script>const All = 'All';</script>
  <div class="wrap">
    <div class="bar">
      <div class="crumbs">ALESIS <span class="tag">DRUMS</span></div>
      <div class="grow"></div>
      <button id="btnCompare" class="btn">Compare <span id="cmpCount">0</span></button>

    </div>

  <!-- env -->
  <script src="/env.js"></script>

  <script>
    /* ===== helpers ===== */
    const $ = (s,el=document)=>el.querySelector(s);
    const $$ = (s,el=document)=>Array.from(el.querySelectorAll(s));

    const fmt = new Intl.NumberFormat('en-AE',{style:'decimal',minimumFractionDigits:2,maximumFractionDigits:2});
    const AED = v => (v==null||v==='') ? '—' : `<span class="aed-icon" aria-hidden="true"></span><span class="amt">${fmt.format(+v)}</span>`;

    function getUPC(r){ return r.upc_code || r.upc || r.ean || r.barcode || null; }

    function pickImage(r,kind='card'){
      const direct = (kind==='detail' && (r.detail_image_url)) || r.primary_image_url || r.image_url;
      return direct || 'data:image/svg+xml;utf8,'+encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400">
          <rect width="100%" height="100%" fill="#f4f6f8"/>
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
            font-family="system-ui,Segoe UI,Arial" font-size="22">Image coming soon</text>
        </svg>`
      );
    }

    function deriveCategory(r){
      if (r.category) return r.category;
      const s=(r.slug||'')+' '+(r.name||'');
      if (/\bamp\b|amplif|monitor/i.test(s)) return 'Drum Amplification';
      if (/samplepad|strike multipad|sr-?1?8|drum machine/i.test(s)) return 'Multipads & Drum Machines';
      if (/headphone|clamp|expansion|pack|accessor/i.test(s)) return 'Accessories';
      return 'Drum Kits';
    }

    const state = { rows:[], byId:new Map(), compare:new Set(), filterLabel:'All' };

    /* ===== fetch data ===== */
    async function load(){
      const url = `${window.ENV.SUPABASE_URL}/rest/v1/drum_kits?select=`+
        [
          'id,name,description,price,upc,upc_code,is_active,slug,category',
          'primary_image_url,detail_image_url,on_demo,on_demo_label',
          'is_new,discontinued,is_new_label,discontinued_label',
          'features,contents,specs,kits_factory,kits_user,sounds,mesh,usb_midi,bluetooth_audio',
          'toms_count,crash_count,ride_zones,kick_tower'
        ].join(',');
      const headers={apikey:window.ENV.SUPABASE_ANON_KEY, Authorization:`Bearer ${window.ENV.SUPABASE_ANON_KEY}`};
      const res = await fetch(url,{headers});
      if(!res.ok){
        console.error('Load failed', res.status, await res.text());
        $('#grid').innerHTML = `<div class="muted">Can't load data (HTTP ${res.status}). Check /public/env.js and RLS policy.</div>`;
        return;
      }
      const rows = await res.json();
      if(!Array.isArray(rows)){ $('#grid').innerHTML = '<div class="muted">Unexpected response.</div>'; return; }
      rows.forEach(r=>r._cat = deriveCategory(r));
      state.rows = rows;
      state.byId = new Map(rows.map(r=>[String(r.id),r]));
      wireChips();
      render();
      updateFab();
    }

    /* ===== UI render ===== */
    function wireChips(){
      // Added "What's New" and "Discontinued" after "On Demo"
      const labels = ['All','Electronic Drum Kits','Multipads & Drum Machines','Drum Amplification','Accessories','On Demo',"What's New",'Discontinued'];
      const chips = labels.map(l=>`<div class="chip${state.filterLabel===l?' active':''}" data-filter="${l}">${l}</div>`).join('');
      const box = $('#chips'); box.innerHTML = chips;
      box.addEventListener('click',e=>{
        const b = e.target.closest('.chip'); if(!b) return;
        $$('#chips .chip').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        state.filterLabel = b.dataset.filter;
        render();
      });
    }

    function fitsFilter(r){
      const c = state.filterLabel;
      if (c==='All') return true;
      if (c==='On Demo')       return !!r.on_demo;
      if (c==="What's New")    return !!r.is_new;
      if (c==='Discontinued')  return !!r.discontinued;
      if (c==='Electronic Drum Kits') return deriveCategory(r)==='Drum Kits';
      return deriveCategory(r)===c;
    }

    /* Build the status corner pill HTML for a card row */
    function statusPill(r){
      if (r.discontinued) return `<div class="status-pill status-pill--discontinued">${r.discontinued_label||'Discontinued'}</div>`;
      if (r.is_new)        return `<div class="status-pill status-pill--whats-new">${r.is_new_label||"What's New"}</div>`;
      if (r.on_demo)       return `<div class="status-pill status-pill--on-demo">${r.on_demo_label||'On Demo'}</div>`;
      return '';
    }

    function render(){
      $('#cmpCount').textContent = state.compare.size;
      const grid = $('#grid');
      const shown = state.rows.filter(fitsFilter);
      if (state.filterLabel===All) shown.sort((a,b)=>(+b.price||0)-(+a.price||0));
      if (state.filterLabel===All) shown.sort((a,b)=>(+b.price||0)-(+a.price||0));
      if (state.filterLabel==='All') shown.sort((a,b)=>(+b.price||0)-(+a.price||0));
      if (!shown.length){ grid.innerHTML = '<div class="muted">No items match this view.</div>'; return; }

      grid.innerHTML = shown.map(r=>{
        const upc = getUPC(r);
        const pills = [];
        if (r.mesh) pills.push('Mesh');
        if (r.usb_midi) pills.push('USB/MIDI');
        if (r.bluetooth_audio) pills.push('Bluetooth');
        const isSelected = state.compare.has(String(r.id));
        return `
          <div class="card" data-id="${r.id}">
            <div class="imgbox" data-open>
              <img src="${pickImage(r,'card')}" alt="">
              ${statusPill(r)}
            </div>
            <div class="content">
              <div class="pill price">${AED(r.price)}</div>
              <div class="title">${r.name||''}</div>
              ${upc?`<div class="muted" style="margin-bottom:2px">UPC: ${upc}</div>`:''}
              <div class="tagrow">
                ${pills.map(p=>`<span class="chip">${p}</span>`).join('')}
              </div>
              <div class="foot">
                <label class="compare-toggle${isSelected?' is-selected':''}">
                  <input type="checkbox" data-compare ${isSelected?'checked':''}>
                  <span class="tick">${isSelected?'✓':''}</span>
                  <span class="lbl">${isSelected?'Selected':'Add to compare'}</span>
                </label>
              </div>
            </div>
          </div>`;
      }).join('');

      // wiring
      $$('#grid .card').forEach(card=>{
        const id = String(card.dataset.id);
        card.addEventListener('click', (e)=>{
          if (e.target.closest('[data-compare]') || e.target.closest('.compare-toggle')) return;
          openDetail(id);
        });
        const cb = card.querySelector('[data-compare]');
        const lbl = card.querySelector('.compare-toggle');
        cb.addEventListener('change', (e)=>{
          const checked = e.currentTarget.checked;
          if (checked) state.compare.add(id); else state.compare.delete(id);
          // Update toggle button visual
          lbl.classList.toggle('is-selected', checked);
          lbl.querySelector('.tick').textContent = checked ? '✓' : '';
          lbl.querySelector('.lbl').textContent  = checked ? 'Selected' : 'Add to compare';
          $('#cmpCount').textContent = state.compare.size;
          updateFab();
        });
      });
    }

    /* ===== Detail modal ===== */
    function asList(node, arr){
      node.innerHTML = '';
      if (!Array.isArray(arr) || !arr.length){ node.innerHTML = '<li>—</li>'; return; }
      node.innerHTML = arr.map(x=>`<li>${String(x)}</li>`).join('');
    }
    function specRow(label, val){
      let v = (val===true)?'Yes' : (val===false||val==null||val==='')?'—' : val;
      return `<tr><td>${label}</td><td style="text-align:right">${v}</td></tr>`;
    }

    function qVal(it, r){
      if (!it) return '—';
      if (it.value!=null) return it.value;
      if (!it.key) return '—';
      const fromData = r.specs && r.specs.data && (r.specs.data[it.key] ?? r.specs.data[it.key.replace(/_in$/,'')]);
      const v = (fromData!==undefined) ? fromData : r[it.key];
      if (it.format==='yesno') return v ? 'Yes' : 'No';
      return (v==null||v==='')?'—':v;
    }

    function buildQuick(r){
      const quickArr = (r.specs && Array.isArray(r.specs.quick)) ? r.specs.quick : null;
      if (quickArr && quickArr.length) return quickArr;

      const cat = deriveCategory(r);
      if (cat==='Drum Amplification'){
        return [
          {label:'Category', value:'Drum Amplification'},
          {label:'Woofer', value: (r.specs?.data?.woofer_in? r.specs.data.woofer_in+'"' : '—')},
          {label:'Power', value:
            (r.specs?.data?.watt_rms || r.specs?.data?.watt_peak)
              ? `${r.specs?.data?.watt_rms||'—'} W RMS / ${r.specs?.data?.watt_peak||'—'} W peak` : '—'},
          {label:'Max SPL', value: r.specs?.data?.max_spl_db ? r.specs.data.max_spl_db+' dB' : '—'},
          {label:'Freq. Response', value:
            (r.specs?.data?.freq_low_hz && r.specs?.data?.freq_high_hz)
              ? `${r.specs.data.freq_low_hz} Hz – ${r.specs.data.freq_high_hz/1000>=1? (r.specs.data.freq_high_hz/1000)+' kHz' : r.specs.data.freq_high_hz+' Hz'}`
              : '—'},
          {label:'Bluetooth', value: r.specs?.data?.bluetooth_version || (r.bluetooth_audio?'Yes':'No')},
          {label:'Inputs', value:r.specs?.data?.inputs || '—'},
          {label:'Outputs', value:r.specs?.data?.outputs || '—'},
          {label:'Dimensions', value:(r.specs?.data?.dimensions_mm? r.specs.data.dimensions_mm+' mm':'—')},
          {label:'Weight', value:(r.specs?.data?.weight_kg? r.specs.data.weight_kg+' kg':'—')}
        ];
      }
      if (cat==='Multipads & Drum Machines'){
        return [
          {label:'Category', value:cat},
          {label:'USB/MIDI', key:'usb_midi', format:'yesno'},
          {label:'Bluetooth', key:'bluetooth_audio', format:'yesno'}
        ];
      }
      if (cat==='Accessories'){
        return [{label:'Category', value:'Accessories'}];
      }
      return [
        {label:'Category', value:'Drum Kits'},
        {label:'Mesh', key:'mesh', format:'yesno'},
        {label:'USB/MIDI', key:'usb_midi', format:'yesno'},
        {label:'Bluetooth', key:'bluetooth_audio', format:'yesno'},
        {label:'Factory kits', key:'kits_factory'},
        {label:'User kits', key:'kits_user'},
        {label:'Sounds', key:'sounds'},
        {label:'Toms', key:'toms_count'},
        {label:'Crash cymbals', key:'crash_count'},
        {label:'Ride zones', key:'ride_zones'},
        {label:'Kick tower', key:'kick_tower', format:'yesno'}
      ];
    }

    function openDetail(id){
      const r = state.byId.get(String(id)); if(!r) return;

      $('#dimg').src = pickImage(r,'detail');

      $('#dprice').innerHTML = AED(r.price);

      $('#dname').textContent = r.name || '';
      const dlab = $('#ddemo');
      // Show status in detail: priority discontinued > is_new > on_demo
      if (r.discontinued){
        dlab.style.display='inline-block';
        dlab.textContent = r.discontinued_label || 'Discontinued';
      } else if (r.is_new){
        dlab.style.display='inline-block';
        dlab.textContent = r.is_new_label || "What's New";
      } else if (r.on_demo){
        dlab.style.display='inline-block';
        dlab.textContent = r.on_demo_label || 'On Demo';
      } else {
        dlab.style.display='none';
      }

      const upc = getUPC(r);
      const upcEl = $('#dupc');
      if (upc){ upcEl.style.display='inline-block'; upcEl.textContent = `UPC: ${upc}`; } else upcEl.style.display='none';

      $('#ddesc').textContent = r.description || '—';
      asList($('#dfeat'), r.features);
      asList($('#dinc'), r.contents);

      const notInc = (r.specs && (r.specs.not_included || r.specs.notIncluded)) || null;
      if (Array.isArray(notInc) && notInc.length){
        $('#dni').style.display='block';
        asList($('#dnot'), notInc);
      }else{
        $('#dni').style.display='none';
      }

      const quick = buildQuick(r);
      $('#dspec').innerHTML = quick.map(it => specRow(it.label || it.key || '', qVal(it, r))).join('');

      const dlg = $('#detail');
      dlg.showModal();
      const closeFn = ()=>dlg.close();
      dlg.addEventListener('click', e=>{ if (e.target.closest('[data-close]')) closeFn(); });
      dlg.addEventListener('keydown', e=>{ if (e.key === 'Escape') closeFn(); });
      dlg.addEventListener('click', e=>{
        const sheet = dlg.querySelector('.sheet');
        const rct = sheet.getBoundingClientRect();
        if (e.clientX<rct.left||e.clientX>rct.right||e.clientY<rct.top||e.clientY>rct.bottom) closeFn();
      });
    }

    /* ===== Compare ===== */
    function openCompare(){
      const ids = Array.from(state.compare);
      const rows = ids.map(id=>state.byId.get(String(id))).filter(Boolean);
      const cols = $('#cmpCols');
      if (!rows.length){ cols.innerHTML = '<div class="muted" style="padding:10px">No items selected.</div>'; }
      else{
        cols.innerHTML = rows.map(r=>{
          const q = buildQuick(r);
          return `
            <div class="col" data-id="${r.id}">
              <div class="pad">
                <div class="pill price" style="margin-bottom:6px">${AED(r.price)}</div>
                <div class="title" style="margin:0 0 8px">${r.name||''}</div>
                <table class="specs">
                  ${q.map(it=>specRow(it.label || it.key || '', qVal(it,r))).join('')}
                </table>
                <div style="display:flex; gap:8px; margin-top:10px">
                  <button class="btn btn-ghost" data-open>Open</button>
                  <button class="btn btn-ghost" data-remove>Remove</button>
                </div>
              </div>
            </div>`;
        }).join('');

        $$('#cmpCols .col').forEach(col=>{
          col.querySelector('[data-open]').onclick=()=>{ $('#cmp').close(); openDetail(col.dataset.id); };
          col.querySelector('[data-remove]').onclick=()=>{
            state.compare.delete(String(col.dataset.id));
            $('#cmpCount').textContent = state.compare.size;
            updateFab();
            openCompare();
          };
        });

        const ladder = $('#ladder');
        if (rows.length>=2){
          const sorted = rows.slice().sort((a,b)=>(+a.price)-(+b.price));
          const base = sorted[0], better = sorted[sorted.length-1];
          const diff = ((+better.price||0)-(+base.price||0));
          const pct = base.price ? Math.round((diff/base.price)*100) : 0;
          const hints = [];
          if ((better.mesh||0) && !base.mesh) hints.push('mesh heads');
          if ((better.kits_factory||0) > (base.kits_factory||0)) hints.push('more factory kits');
          if ((better.sounds||0) > (base.sounds||0)) hints.push('more sounds');
          if ((better.bluetooth_audio||0) && !base.bluetooth_audio) hints.push('Bluetooth audio');
          if ((better.usb_midi||0) && !base.usb_midi) hints.push('USB/MIDI');
          const why = hints.length ? hints.join(', ') : 'overall higher spec';
          ladder.innerHTML = `
            <div class="section">
              <h4 style="margin-bottom:8px">Recommendation Ladder</h4>
              <div class="row" style="margin-bottom:6px">
                <span class="chip">Baseline</span>
                <b>${base.name}</b> — <span class="pill price" style="padding:4px 10px">${AED(base.price)}</span>
              </div>
              <div class="row" style="margin-bottom:6px">
                <span class="chip">Jump to</span>
                <b>${better.name}</b> — <span class="pill price" style="padding:4px 10px">${AED(better.price)}</span>
                <span class="chip" style="background:#143a42;border:1px solid #1a4f59">+${fmt.format(diff)} (${pct}%)</span>
              </div>
              <div class="muted">Why: ${why}.</div>
            </div>`;
        } else {
          ladder.innerHTML = '';
        }
      }

      const dlg = $('#cmp');
      dlg.showModal();
      dlg.addEventListener('click', e=>{ if (e.target.closest('[data-close]')) dlg.close(); });
      dlg.addEventListener('keydown', e=>{ if (e.key === 'Escape') dlg.close(); });
    }

    /* ===== Wizard ===== */
    function openWizard(){
      const dlg = $('#wizard');
      const out = $('#wizOut');
      out.textContent = '';
      dlg.showModal();
      dlg.addEventListener('click', e=>{ if (e.target.closest('[data-close]')) dlg.close(); });
      dlg.addEventListener('keydown', e=>{ if (e.key === 'Escape') dlg.close(); });
      $('#wGo').onclick=()=>{
        const [lo,hi] = $('#wBud').value.split('-').map(Number);
        const conn = $('#wConn').value;
        const choices = state.rows.filter(r=>{
          const p = +r.price || 0;
          if (p<lo || p>hi) return false;
          if (conn==='USB/MIDI' && !r.usb_midi) return false;
          if (conn==='Bluetooth' && !r.bluetooth_audio) return false;
          return deriveCategory(r)==='Drum Kits';
        }).sort((a,b)=>(+a.price)-(+b.price));

        if (!choices.length){ out.innerHTML = '<div class="muted">No kit matches your preferences.</div>'; return; }
        const top = choices[Math.min(1, choices.length-1)];
        const msg = `Because it matches your budget, ${conn==='No preference'?'your needs':'your connectivity preference'}, and offers ${top.mesh?'mesh heads':'a solid starter spec'}.`;
        out.innerHTML = `
          <div class="section">
            <div style="font-weight:900; color:#9ff8ff">Your Match</div>
            <div style="margin:6px 0"><b>${top.name}</b> looks like a great fit at <span class="pill price" style="padding:4px 10px">${AED(top.price)}</span>.</div>
            <div class="muted">${msg}</div>
            <div style="margin-top:10px"><button class="btn btn-primary" id="wizOpen">View This Kit</button></div>
          </div>`;
        $('#wizOpen').onclick=()=>{ dlg.close(); openDetail(top.id); };
      };
    }

    /* ===== Compare FAB ===== */
    function updateFab(){
      const show = state.compare.size>0;
      const el = document.getElementById('compareFab');
      el.style.display = show ? 'flex' : 'none';
      document.getElementById('fabCount').textContent = state.compare.size;
      document.getElementById('cmpCount').textContent = state.compare.size;
    }
    document.getElementById('compareFab').addEventListener('click', ()=>openCompare());

    /* ===== header buttons ===== */
    function wireHeader(){
      $('#btnCompare').onclick=()=>openCompare();
      $('#btnWizard').onclick=()=>openWizard();
    }

    /* ===== boot ===== */
    window.addEventListener('DOMContentLoaded', async ()=>{
      wireHeader();
      await load();
    });
  </script>
  <script type="module" src="chips-backfill.js"></script>
  <script type="module" src="chips-for.js"></script>
  <script type="module" src="chips-fetch.js"></script>
</body>
</html>
